name = 'square-connect'
main = "src/index.ts"
compatibility_date = "2024-09-23"

[vars]
SQUARE_ENV = "sandbox"

# 秘密情報は `wrangler secret put SQUARE_ACCESS_TOKEN`、
# `wrangler secret put SQUARE_WEBHOOK_SIGNATURE_KEY`、
# `wrangler secret put SUPABASE_SERVICE_ROLE_KEY` で登録する（このファイルには書かない）。
# ローカル開発では .dev.vars（.dev.vars.example を参照、gitignore対象）を使う。

[assets]
directory = "../web/dist"
not_found_handling = "single-page-application"
