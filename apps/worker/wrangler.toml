name = 'square-connect'
main = "src/index.ts"
compatibility_date = "2024-09-23"

[vars]
SQUARE_ENV = "production"
SUPABASE_URL = "https://gxsoswtazayaqggkvklr.supabase.co"

[[r2_buckets]]
binding = "ITEM_IMAGES"
bucket_name = "square-connect-images"

# 秘密情報は `wrangler secret put SQUARE_ACCESS_TOKEN`、
# `wrangler secret put SQUARE_WEBHOOK_SIGNATURE_KEY`、
# `wrangler secret put SUPABASE_SECRET_KEY` で登録する（このファイルには書かない）。
# ローカル開発では .dev.vars（.dev.vars.example を参照、gitignore対象）を使う。

[assets]
directory = "../web/dist"
not_found_handling = "single-page-application"

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
